ShortDescription: Improve prompts via Claude CLI or Anthropic API from the terminal.
Description: |
  PromptPal is a bash + Python3 CLI that rewrites prompts via Claude CLI
  or the Anthropic Messages API. The Windows package installs a thin
  launcher that forwards all arguments into WSL Ubuntu, where the actual
  PromptPal binary lives. Install PromptPal inside WSL Ubuntu separately
  via the upstream install.sh script. The launcher prints a hint and
  exits 1 when WSL Ubuntu is not present.
